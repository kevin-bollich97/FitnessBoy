name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          ./gradlew assembleRelease \
            -PreleaseVersionName="$VERSION_NAME" \
            -PreleaseVersionCode="$VERSION_CODE"

      - name: Prepare release assets
        run: |
          cp app/build/outputs/apk/release/app-release.apk "FitnessBoy-${GITHUB_REF_NAME}.apk"
          sha256sum "FitnessBoy-${GITHUB_REF_NAME}.apk" > "FitnessBoy-${GITHUB_REF_NAME}.apk.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FitnessBoy-${{ github.ref_name }}.apk
            FitnessBoy-${{ github.ref_name }}.apk.sha256
